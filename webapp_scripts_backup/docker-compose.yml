version: '2.4'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: carboxylase_backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/database_files:/app/database_files:ro
      - ./models:/srv/app/backend/ml_models:ro
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: carboxylase_frontend
    ports:
      - "127.0.0.1:18080:80"
    depends_on:
      - backend
    restart: unless-stopped
